name: Deploy Flutter Web to Supabase

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_BUCKET: flutter-web
      SUPABASE_WEB_DIR: build/web
      SUPABASE_CACHE_MODE: safe-flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Write Supabase env file for Flutter
        run: |
          cat > supabase.functions.local.env <<'EOF'
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
          SUPABASE_ANON_KEY=${SUPABASE_PUBLISHABLE_KEY}
          EOF

      - name: Build Flutter Web
        run: flutter build web --release --base-href / --dart-define-from-file=supabase.functions.local.env

      - name: Upload to Supabase
        run: npm run supabase:web:upload
